<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RT 05 Budair Connect</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#f97316"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}body{background:#f1f5f9}.app{max-width:480px;margin:0 auto;min-height:100vh}.hdr{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;padding:28px 20px 48px;border-radius:0 0 24px 24px}.hdr .hi{opacity:.9;font-size:14px}.hdr .title{font-size:22px;font-weight:800;margin-top:2px}.card{background:#fff;border-radius:20px;padding:16px;margin:14px 16px;box-shadow:0 4px 14px rgba(0,0,0,.06)}.saldo-card{margin-top:-32px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px;text-align:center}.small{font-size:12px;color:#64748b}.big{font-size:20px;font-weight:800;color:#0f172a}.menu{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:4px 16px}.mi{text-align:center;cursor:pointer}.mi .ic{width:60px;height:60px;background:#fff;border-radius:18px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 3px 10px rgba(0,0,0,.08)}.list{background:#fff;border-radius:14px;padding:14px;margin:10px 16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}.badge{display:inline-block;background:#dcfce7;color:#15803d;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;margin-bottom:6px}.tagihan{background:#fff7ed;border-left:4px solid #f97316}.btn{width:100%;padding:12px;background:#f97316;color:#fff;border:none;border-radius:10px;font-weight:700;margin-top:8px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:99}.modal.show{display:flex}.sheet{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:20px;max-height:88vh;overflow:auto}input,select,textarea{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;margin:7px 0;font-size:15px}</style></head><body>
<div class="app">
  <div class="hdr"><div class="hi" id="hi">Halo, Warga</div><div class="title">RT 05 Budair Connect</div></div>
  <div class="card saldo-card">
    <div style="display:flex;justify-content:space-between"><div><div class="small">Saldo Kas</div><div class="big" id="saldo">Rp 0</div></div><div class="small" id="userName">-</div></div>
    <div class="grid3"><div><div class="small">Masuk</div><b id="masuk" style="color:#16a34a">Rp 0</b></div><div><div class="small">Keluar</div><b id="keluar" style="color:#dc2626">Rp 0</b></div><div><div class="small">Update</div><b id="time">-</b></div></div>
  </div>
  <div id="tagihanCard"></div>
  <div class="menu"><div class="mi" onclick="openKas()"><div class="ic">🏦</div><div class="small">Keuangan</div></div><div class="mi" onclick="openUm()"><div class="ic">📢</div><div class="small">Pengumuman</div></div><div class="mi" onclick="openSur()"><div class="ic">✉️</div><div class="small">Surat</div></div><div class="mi" onclick="openLap()"><div class="ic">📋</div><div class="small">Lapor</div></div></div>
  <div id="feed" style="padding-bottom:80px"></div>
</div>
<div class="modal" id="mKas"><div class="sheet"><h3>Keuangan <span onclick="mKas.classList.remove('show')" style="float:right">×</span></h3><div id="kList"></div></div></div>
<div class="modal" id="mUm"><div class="sheet"><h3>Pengumuman <span onclick="mUm.classList.remove('show')" style="float:right">×</span></h3><div id="uList"></div></div></div>
<div class="modal" id="mSur"><div class="sheet"><h3>Ajukan Surat <span onclick="mSur.classList.remove('show')" style="float:right">×</span></h3><input id="sNama" placeholder="Nama lengkap"><select id="sJenis"><option>Surat Keterangan Domisili</option><option>SKTM</option><option>Surat Pengantar KTP</option><option>Surat Pengantar KK</option><option>Surat Keterangan Usaha</option></select><textarea id="sKep" rows="2" placeholder="Keperluan"></textarea><button class="btn" onclick="saveSur()">Kirim</button><div id="sList"></div></div></div>
<div class="modal" id="mLap"><div class="sheet"><h3>Lapor <span onclick="mLap.classList.remove('show')" style="float:right">×</span></h3><input id="lJud" placeholder="Judul"><select id="lKat"><option>Infrastruktur</option><option>Kebersihan</option><option>Keamanan</option></select><textarea id="lIsi" rows="3"></textarea><button class="btn" onclick="saveLap()" id="bLap">Kirim</button><div id="lList"></div></div></div>
<script>
const sb=supabase.createClient('https://pivkaidaqnkmrpsymhdd.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdmthaWRhcW5rbXJwc3ltaGRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkwNDYsImV4cCI6MjA5NTAyNTA0Nn0.j6-sGSYFLrq3B-1HOnlM5OPdgx9nwjgAl9_qBighWG8');
let NAMA = localStorage.getItem('rt_nama') || prompt('Nama Anda:') || 'Warga'; localStorage.setItem('rt_nama',NAMA);
hi.textContent='Halo, '+NAMA; userName.textContent=NAMA;
async function load(){
 const ks=await sb.from('kas_transaksi').select('jumlah'); let masukVal=0,keluarVal=0; ks.data?.forEach(x=>{if(x.jumlah>0) masukVal+=x.jumlah; else keluarVal+=Math.abs(x.jumlah)}); const saldoVal=masukVal-keluarVal; saldo.textContent='Rp '+saldoVal.toLocaleString('id-ID'); masuk.textContent='Rp '+masukVal.toLocaleString('id-ID'); keluar.textContent='Rp '+keluarVal.toLocaleString('id-ID');
 time.textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
 const p=await sb.from('pengumuman').select('*').order('created_at',{ascending:false}).limit(5); feed.innerHTML=p.data.map(x=>`<div class="list"><span class="badge">${x.kategori}</span><div style="font-weight:700">${x.judul}</div><div class="small">${x.isi}</div></div>`).join('');
 // load tagihan
 const w=await sb.from('warga').select('*').eq('nama',NAMA).maybeSingle(); if(w.data){ const t=await sb.from('iuran_tagihan').select('*').eq('warga_id',w.data.id).eq('status','belum').order('periode'); if(t.data.length){ tagihanCard.innerHTML=`<div class="card tagihan"><b>Tagihan Iuran Anda</b>`+t.data.map(x=>`<div style="display:flex;justify-content:space-between;margin:8px 0"><div>${x.periode} - Rp ${x.jumlah.toLocaleString('id-ID')}</div><button class="btn" style="width:auto;padding:6px 12px" onclick="bayar(${x.id})">Bayar</button></div>`).join('')+`</div>` } else { tagihanCard.innerHTML=`<div class="card"><div class="small">✅ Tidak ada tagihan</div></div>` } }
}
function openKas(){mKas.classList.add('show');loadKas()} function openUm(){mUm.classList.add('show');loadUm()} function openSur(){mSur.classList.add('show');loadSur()} function openLap(){mLap.classList.add('show');loadLap()}
async function loadKas(){const r=await sb.from('kas_transaksi').select('*').order('id',{ascending:false}).limit(10);kList.innerHTML=r.data.map(x=>`<div class="list">${x.keterangan} - Rp ${Math.abs(x.jumlah).toLocaleString('id-ID')}</div>`).join('')}
async function loadUm(){const p=await sb.from('pengumuman').select('*').order('id',{ascending:false}).limit(10);uList.innerHTML=p.data.map(x=>`<div class="list"><b>${x.judul}</b><div class="small">${x.isi}</div></div>`).join('')}
async function saveSur(){await sb.from('surat').insert({jenis_surat:sJenis.value,keperluan:sNama.value+' - '+sKep.value,status:'diajukan',tanggal_pengajuan:new Date().toISOString().split('T')[0]}); loadSur()}
async function loadSur(){const s=await sb.from('surat').select('*').limit(5);sList.innerHTML=s.data.map(x=>`<div class="list">${x.jenis_surat} - ${x.status}</div>`).join('')}
async function saveLap(){await sb.from('pengaduan').insert({judul:lJud.value,isi:lIsi.value,kategori:lKat.value,status:'open'}); loadLap()}
async function loadLap(){const l=await sb.from('pengaduan').select('*').limit(5);lList.innerHTML=l.data.map(x=>`<div class="list">${x.judul}</div>`).join('')}
async function bayar(id){
  const fileInput=document.createElement('input'); fileInput.type='file'; fileInput.accept='image/*';
  fileInput.onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    if(!confirm('Upload bukti transfer dan konfirmasi bayar?')) return;
    const path=`iuran/${id}-${Date.now()}-${file.name}`;
    const up=await sb.storage.from('bukti-iuran').upload(path,file,{upsert:true});
    if(up.error){ alert('Gagal upload: '+up.error.message); return }
    const url=sb.storage.from('bukti-iuran').getPublicUrl(path).data.publicUrl;
    const {data:t}=await sb.from('iuran_tagihan').select('*,warga(nama)').eq('id',id).single();
    const {data:kas}=await sb.from('kas_transaksi').insert({kategori_id:1,jumlah:t.jumlah,keterangan:'Iuran '+t.periode+' - '+t.warga.nama,tanggal:new Date().toISOString().split('T')[0],bukti_url:url}).select().single();
    await sb.from('iuran_tagihan').update({status:'lunas',tanggal_bayar:new Date().toISOString().split('T')[0],kas_id:kas.id,bukti_url:url}).eq('id',id);
    alert('Terima kasih! Bukti tersimpan dan pembayaran tercatat.');
    load();
  };
  fileInput.click();
}
load(); setInterval(load,30000);
</script></body></html>
